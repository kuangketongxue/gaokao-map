<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 中转站测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            padding: 30px 0 10px;
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .config-panel {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #2a2a4a;
        }

        .config-panel h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #a0a0cc;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-panel h2::before {
            content: '⚙️';
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #999;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: #0f0f23;
            border: 1px solid #333366;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #555;
        }

        .provider-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .provider-tab {
            flex: 1;
            padding: 12px;
            border: 2px solid #2a2a4a;
            border-radius: 12px;
            background: #0f0f23;
            color: #888;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            user-select: none;
        }

        .provider-tab:hover {
            border-color: #444;
        }

        .provider-tab.active-openai {
            border-color: #10a37f;
            background: rgba(16, 163, 127, 0.1);
            color: #10a37f;
        }

        .provider-tab.active-claude {
            border-color: #d97706;
            background: rgba(217, 119, 6, 0.1);
            color: #d97706;
        }

        .provider-tab.active-nvidia {
            border-color: #76b900;
            background: rgba(118, 185, 0, 0.1);
            color: #76b900;
        }

        .chat-panel {
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #2a2a4a;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 18px;
            color: #a0a0cc;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-ready {
            background: rgba(16, 163, 127, 0.15);
            color: #10a37f;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .status-loading {
            background: rgba(234, 179, 8, 0.15);
            color: #eab308;
        }

        .chat-messages {
            height: 420px;
            overflow-y: auto;
            padding: 20px 24px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .avatar-user { background: #667eea; color: white; }
        .avatar-openai { background: #10a37f; color: white; }
        .avatar-claude { background: #d97706; color: white; }
        .avatar-nvidia { background: #76b900; color: white; }
        .avatar-error { background: #ef4444; color: white; }

        .message-name {
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
        }

        .message-time {
            font-size: 11px;
            color: #555;
            margin-left: auto;
        }

        .message-content {
            margin-left: 36px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .content-user { background: #252547; color: #d0d0f0; }
        .content-openai { background: #162016; color: #c0e0c0; border: 1px solid #1a3a1a; }
        .content-claude { background: #2a1f10; color: #e0d0b0; border: 1px solid #3a2a1a; }
        .content-nvidia { background: #1a2010; color: #d0e0b0; border: 1px solid #2a3a1a; }
        .content-error { background: #2a1015; color: #f0a0a0; border: 1px solid #3a1520; }

        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #555;
        }

        .empty-chat .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-chat p { font-size: 14px; }

        .chat-input-area {
            padding: 16px 24px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .chat-input-area textarea {
            flex: 1;
            padding: 12px 16px;
            background: #0f0f23;
            border: 1px solid #333366;
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 48px;
            max-height: 150px;
            transition: border-color 0.3s;
        }

        .chat-input-area textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .chat-input-area textarea::placeholder { color: #555; }

        .btn-send {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            min-width: 72px;
        }

        .btn-send:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-send.btn-stop {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .btn-clear {
            padding: 12px 16px;
            background: #2a2a4a;
            color: #aaa;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-clear:hover { background: #3a3a5a; color: #ddd; }

        .quick-tests {
            display: flex;
            gap: 8px;
            padding: 0 24px 12px;
            flex-wrap: wrap;
        }

        .quick-test-btn {
            padding: 6px 14px;
            background: #252547;
            border: 1px solid #333366;
            border-radius: 20px;
            color: #9999cc;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-test-btn:hover { background: #333366; color: #ccccff; }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .info-panel {
            margin-top: 20px;
            padding: 16px 20px;
            background: #1a1a2e;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            font-size: 12px;
            color: #666;
        }

        .info-panel summary {
            cursor: pointer;
            color: #888;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .info-panel pre {
            background: #0f0f23;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            color: #888;
            margin-top: 8px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }

        .options-row {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
        }

        .toggle-switch input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 36px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch input[type="checkbox"]::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle-switch input[type="checkbox"]:checked { background: #667eea; }
        .toggle-switch input[type="checkbox"]:checked::after { transform: translateX(16px); }

        .param-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #888;
        }

        .param-item input[type="range"] {
            width: 80px;
            accent-color: #667eea;
        }

        .param-item input[type="number"] {
            width: 70px;
            padding: 4px 8px;
            background: #0f0f23;
            border: 1px solid #333366;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 12px;
        }

        .key-toggle {
            position: relative;
        }

        .key-toggle .eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 16px;
            padding: 2px;
        }

        .key-toggle .eye-btn:hover { color: #aaa; }

        .test-conn-btn {
            padding: 8px 16px;
            background: #252547;
            border: 1px solid #667eea;
            border-radius: 8px;
            color: #667eea;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .test-conn-btn:hover {
            background: rgba(102, 126, 234, 0.15);
        }

        .response-meta {
            margin-left: 36px;
            margin-top: 4px;
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 API 中转站测试工具</h1>
        <p class="subtitle">测试 GPT / Claude / NVIDIA NIM 中转 API 是否可用</p>

        <div class="config-panel">
            <h2>连接配置</h2>

            <div class="provider-tabs">
                <div class="provider-tab active-openai" id="tab-openai" onclick="switchProvider('openai')">
                    🟢 OpenAI (GPT)
                </div>
                <div class="provider-tab" id="tab-claude" onclick="switchProvider('claude')">
                    🟠 Claude
                </div>
                <div class="provider-tab" id="tab-nvidia" onclick="switchProvider('nvidia')">
                    🟢 NVIDIA NIM
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label>API Base URL（中转站地址）</label>
                    <input type="text" id="baseUrl" placeholder="例如: https://api.example.com/v1">
                </div>
                <div class="form-group" style="flex: 2;">
                    <label>API Key</label>
                    <div class="key-toggle">
                        <input type="password" id="apiKey" placeholder="输入你的 API Key">
                        <button class="eye-btn" onclick="toggleKeyVisibility()" id="eyeBtn">👁</button>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>模型</label>
                    <select id="model"></select>
                </div>
                <div class="form-group">
                    <label>自定义模型名（可选，优先使用）</label>
                    <input type="text" id="customModel" placeholder="留空则使用左侧选择">
                </div>
                <div class="form-group" style="flex: 0; min-width: auto; display: flex; align-items: flex-end;">
                    <button class="test-conn-btn" onclick="testConnection()">🔍 测试连接</button>
                </div>
            </div>

            <div class="options-row">
                <div class="toggle-switch">
                    <input type="checkbox" id="streamToggle" checked>
                    <label for="streamToggle">流式输出</label>
                </div>
                <div class="param-item">
                    <label>Temperature:</label>
                    <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
                    <span id="tempValue">0.7</span>
                </div>
                <div class="param-item">
                    <label>Max Tokens:</label>
                    <input type="number" id="maxTokens" value="2048" min="1" max="128000">
                </div>
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-header">
                <h2 id="chatTitle">💬 对话测试</h2>
                <span class="status-badge status-ready" id="statusBadge">就绪</span>
            </div>

            <div class="quick-tests">
                <button class="quick-test-btn" onclick="quickTest('你好，请简单介绍你自己。')">👋 打招呼</button>
                <button class="quick-test-btn" onclick="quickTest('1+1等于多少？')">🔢 简单数学</button>
                <button class="quick-test-btn" onclick="quickTest('用Python写一个快速排序。')">💻 写代码</button>
                <button class="quick-test-btn" onclick="quickTest('请用中文写一首关于春天的五言绝句。')">📝 写诗</button>
                <button class="quick-test-btn" onclick="quickTest('What model are you? Please tell me your exact model name/version.')">🤖 识别模型</button>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="empty-chat" id="emptyChat">
                    <div class="icon">🚀</div>
                    <p>填写配置后发送消息开始测试</p>
                </div>
            </div>

            <div class="chat-input-area">
                <textarea id="userInput" placeholder="输入问题... (Ctrl+Enter / Enter 发送)" rows="1" oninput="autoResize(this)"></textarea>
                <button class="btn-clear" onclick="clearChat()">清空</button>
                <button class="btn-send" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>

        <div class="info-panel">
            <details>
                <summary>📋 调试日志（点击展开查看完整请求/响应）</summary>
                <pre id="debugLog">等待请求...</pre>
            </details>
        </div>
    </div>

    <script>
        let currentProvider = 'openai';
        let chatHistory = [];
        let isLoading = false;
        let currentController = null;

        const modelOptions = {
            openai: [
                { value: 'gpt-3.5-turbo', label: 'gpt-3.5-turbo' },
                { value: 'gpt-4', label: 'gpt-4' },
                { value: 'gpt-4-turbo', label: 'gpt-4-turbo' },
                { value: 'gpt-4o', label: 'gpt-4o' },
                { value: 'gpt-4o-mini', label: 'gpt-4o-mini' },
                { value: 'gpt-4.1', label: 'gpt-4.1' },
                { value: 'gpt-4.1-mini', label: 'gpt-4.1-mini' },
                { value: 'gpt-4.1-nano', label: 'gpt-4.1-nano' },
                { value: 'o1', label: 'o1' },
                { value: 'o1-mini', label: 'o1-mini' },
                { value: 'o3-mini', label: 'o3-mini' },
            ],
            claude: [
                { value: 'claude-sonnet-4-20250514', label: 'claude-sonnet-4 (最新)' },
                { value: 'claude-opus-4-20250514', label: 'claude-opus-4 (最新)' },
                { value: 'claude-3-5-sonnet-20241022', label: 'claude-3.5-sonnet' },
                { value: 'claude-3-5-haiku-20241022', label: 'claude-3.5-haiku' },
                { value: 'claude-3-opus-20240229', label: 'claude-3-opus' },
                { value: 'claude-3-sonnet-20240229', label: 'claude-3-sonnet' },
                { value: 'claude-3-haiku-20240307', label: 'claude-3-haiku' },
            ],
            nvidia: [
                { value: 'meta/llama-3.3-70b-instruct', label: 'Llama 3.3 70B' },
                { value: 'meta/llama-3.1-405b-instruct', label: 'Llama 3.1 405B' },
                { value: 'meta/llama-3.1-70b-instruct', label: 'Llama 3.1 70B' },
                { value: 'meta/llama-3.1-8b-instruct', label: 'Llama 3.1 8B' },
                { value: 'google/gemma-2-27b-it', label: 'Gemma 2 27B' },
                { value: 'mistralai/mistral-large-2-instruct', label: 'Mistral Large 2' },
                { value: 'mistralai/mixtral-8x22b-instruct-v0.1', label: 'Mixtral 8x22B' },
                { value: 'nvidia/nemotron-4-340b-instruct', label: 'Nemotron-4 340B' },
                { value: 'deepseek-ai/deepseek-r1', label: 'DeepSeek R1' },
                { value: 'qwen/qwen2.5-72b-instruct', label: 'Qwen 2.5 72B' },
            ]
        };

        const defaultUrls = {
            openai: 'https://api.openai.com/v1',
            claude: 'https://api.anthropic.com',
            nvidia: 'https://integrate.api.nvidia.com/v1'
        };

        const providerLabels = {
            openai: 'GPT',
            claude: 'Claude',
            nvidia: 'NVIDIA'
        };

        // 初始化
        switchProvider('openai');

        function switchProvider(provider) {
            currentProvider = provider;

            document.querySelectorAll('.provider-tab').forEach(tab => tab.className = 'provider-tab');
            document.getElementById('tab-' + provider).className = 'provider-tab active-' + provider;

            // 更新模型列表
            const select = document.getElementById('model');
            select.innerHTML = modelOptions[provider].map(m =>
                `<option value="${m.value}">${m.label}</option>`
            ).join('');

            // 更新 placeholder
            const urlInput = document.getElementById('baseUrl');
            urlInput.placeholder = `默认: ${defaultUrls[provider]}`;

            // Claude 提示
            if (provider === 'claude') {
                urlInput.placeholder = '例如: https://your-proxy.com （不要加 /v1/messages）';
            } else {
                urlInput.placeholder = `例如: https://your-proxy.com/v1 （需含 /v1）`;
            }
        }

        document.getElementById('temperature').addEventListener('input', function () {
            document.getElementById('tempValue').textContent = this.value;
        });

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        document.getElementById('userInput').addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
            // 也支持单独 Enter（非 Shift+Enter）
            if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function toggleKeyVisibility() {
            const input = document.getElementById('apiKey');
            const btn = document.getElementById('eyeBtn');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁';
            }
        }

        function setStatus(type, text) {
            const badge = document.getElementById('statusBadge');
            badge.className = 'status-badge status-' + type;
            badge.textContent = text;
        }

        function appendLog(text) {
            const log = document.getElementById('debugLog');
            const timestamp = new Date().toLocaleTimeString();
            log.textContent += `\n[${timestamp}] ${text}`;
            log.scrollTop = log.scrollHeight;
        }

        function clearLog() {
            document.getElementById('debugLog').textContent = '';
        }

        function clearChat() {
            chatHistory = [];
            document.getElementById('chatMessages').innerHTML = `
                <div class="empty-chat" id="emptyChat">
                    <div class="icon">🚀</div>
                    <p>填写配置后发送消息开始测试</p>
                </div>
            `;
        }

        function nowTime() {
            return new Date().toLocaleTimeString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getBaseUrl() {
            return document.getElementById('baseUrl').value.trim() || defaultUrls[currentProvider];
        }

        function getApiKey() {
            return document.getElementById('apiKey').value.trim();
        }

        function getModel() {
            return document.getElementById('customModel').value.trim() || document.getElementById('model').value;
        }

        // 添加用户消息到界面
        function addUserMessage(content) {
            const container = document.getElementById('chatMessages');
            const empty = document.getElementById('emptyChat');
            if (empty) empty.remove();

            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar avatar-user">你</div>
                    <span class="message-name">你</span>
                    <span class="message-time">${nowTime()}</span>
                </div>
                <div class="message-content content-user">${escapeHtml(content)}</div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        // 添加AI回复到界面（支持流式更新）
        function addAIMessage() {
            const container = document.getElementById('chatMessages');
            const avatarClass = 'avatar-' + currentProvider;
            const contentClass = 'content-' + currentProvider;
            const label = providerLabels[currentProvider];
            const avatarChar = label[0];

            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar ${avatarClass}">${avatarChar}</div>
                    <span class="message-name">${label}</span>
                    <span class="message-time">${nowTime()}</span>
                </div>
                <div class="message-content ${contentClass}" id="ai-content-live">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
            return document.getElementById('ai-content-live');
        }

        function updateAIContent(el, text) {
            if (!el) return;
            el.textContent = text || '(空响应)';
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        function finalizeAIContent(el, text, meta) {
            if (!el) return;
            el.removeAttribute('id');
            el.textContent = text || '(空响应)';

            if (meta) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'response-meta';
                metaDiv.textContent = meta;
                el.parentElement.appendChild(metaDiv);
            }
        }

        function addErrorMessage(content) {
            const container = document.getElementById('chatMessages');
            const empty = document.getElementById('emptyChat');
            if (empty) empty.remove();

            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar avatar-error">✕</div>
                    <span class="message-name">错误</span>
                    <span class="message-time">${nowTime()}</span>
                </div>
                <div class="message-content content-error">${escapeHtml(content)}</div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        function quickTest(question) {
            document.getElementById('userInput').value = question;
            autoResize(document.getElementById('userInput'));
            sendMessage();
        }

        // 测试连接（列出模型）
        async function testConnection() {
            const baseUrl = getBaseUrl();
            const apiKey = getApiKey();
            if (!apiKey) { alert('请先填写 API Key'); return; }

            clearLog();
            setStatus('loading', '测试中...');

            try {
                let url;
                let headers;

                if (currentProvider === 'claude') {
                    // Claude: GET /v1/models 或尝试发一条简单消息
                    url = baseUrl.replace(/\/+$/, '') + '/v1/messages';
                    headers = {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'Authorization': `Bearer ${apiKey}`
                    };
                    appendLog(`测试 Claude 连接: POST ${url}`);
                    const resp = await fetch(url, {
                        method: 'POST',
                        headers,
                        body: JSON.stringify({
                            model: getModel(),
                            max_tokens: 32,
                            messages: [{ role: 'user', content: 'Hi' }]
                        })
                    });
                    const data = await resp.text();
                    appendLog(`状态: ${resp.status}`);
                    appendLog(`响应: ${data}`);
                    if (resp.ok) {
                        setStatus('ready', '✅ 连接成功');
                    } else {
                        setStatus('error', `❌ HTTP ${resp.status}`);
                    }
                } else {
                    // OpenAI / NVIDIA: GET /models
                    url = baseUrl.replace(/\/+$/, '') + '/models';
                    headers = { 'Authorization': `Bearer ${apiKey}` };
                    appendLog(`测试连接: GET ${url}`);
                    const resp = await fetch(url, { headers });
                    appendLog(`状态: ${resp.status}`);
                    if (resp.ok) {
                        const data = await resp.json();
                        const models = (data.data || []).map(m => m.id).slice(0, 30);
                        appendLog(`可用模型 (前30): \n${models.join('\n')}`);
                        setStatus('ready', `✅ 连接成功，${data.data?.length || 0} 个模型`);
                    } else {
                        const text = await resp.text();
                        appendLog(`错误: ${text}`);
                        setStatus('error', `❌ HTTP ${resp.status}`);
                    }
                }
            } catch (err) {
                appendLog(`连接失败: ${err.message}`);
                setStatus('error', '❌ 连接失败');
            }
        }

        // ==================== 发送消息主逻辑 ====================
        async function sendMessage() {
            if (isLoading) {
                if (currentController) {
                    currentController.abort();
                    currentController = null;
                }
                isLoading = false;
                const btn = document.getElementById('sendBtn');
                btn.textContent = '发送';
                btn.classList.remove('btn-stop');
                setStatus('ready', '已取消');
                return;
            }

            const apiKey = getApiKey();
            const userInput = document.getElementById('userInput').value.trim();

            if (!apiKey) { alert('请填写 API Key'); return; }
            if (!userInput) return;

            const baseUrl = getBaseUrl();
            const model = getModel();
            const temperature = parseFloat(document.getElementById('temperature').value);
            const maxTokens = parseInt(document.getElementById('maxTokens').value);
            const stream = document.getElementById('streamToggle').checked;

            // 添加用户消息
            addUserMessage(userInput);
            chatHistory.push({ role: 'user', content: userInput });
            document.getElementById('userInput').value = '';
            document.getElementById('userInput').style.height = 'auto';

            isLoading = true;
            const btn = document.getElementById('sendBtn');
            btn.textContent = '停止';
            btn.classList.add('btn-stop');
            setStatus('loading', '请求中...');
            clearLog();

            currentController = new AbortController();
            const startTime = Date.now();

            try {
                let result;
                if (currentProvider === 'claude') {
                    result = await sendClaude(baseUrl, apiKey, model, temperature, maxTokens, stream);
                } else {
                    // openai 和 nvidia 都用 OpenAI 兼容格式
                    result = await sendOpenAICompatible(baseUrl, apiKey, model, temperature, maxTokens, stream);
                }

                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                if (result) {
                    chatHistory.push({ role: 'assistant', content: result });
                    appendLog(`✅ 完成，耗时 ${elapsed}s，共 ${result.length} 字符`);
                }
                setStatus('ready', `✅ ${elapsed}s`);

            } catch (error) {
                if (error.name === 'AbortError') {
                    appendLog('⚠️ 请求已被用户取消');
                    // 移除正在流式输出的元素中的loading
                    const liveEl = document.getElementById('ai-content-live');
                    if (liveEl) {
                        liveEl.removeAttribute('id');
                        if (!liveEl.textContent.trim() || liveEl.querySelector('.typing-indicator')) {
                            liveEl.textContent = '(已取消)';
                        }
                    }
                } else {
                    const errMsg = error.message || String(error);
                    addErrorMessage(errMsg);
                    appendLog(`❌ 错误: ${errMsg}`);
                    setStatus('error', '请求失败');
                    // 移除loading元素
                    const liveEl = document.getElementById('ai-content-live');
                    if (liveEl) liveEl.parentElement.parentElement.remove();
                }
            } finally {
                isLoading = false;
                btn.textContent = '发送';
                btn.classList.remove('btn-stop');
                currentController = null;
            }
        }

        // ==================== OpenAI 兼容接口 (GPT / NVIDIA) ====================
        async function sendOpenAICompatible(baseUrl, apiKey, model, temperature, maxTokens, stream) {
            const url = baseUrl.replace(/\/+$/, '') + '/chat/completions';

            const body = {
                model: model,
                messages: chatHistory.slice(), // 副本
                temperature: temperature,
                max_tokens: maxTokens,
                stream: stream
            };

            appendLog(`→ POST ${url}`);
            appendLog(`模型: ${model} | 流式: ${stream} | temp: ${temperature} | max_tokens: ${maxTokens}`);
            appendLog(`请求体:\n${JSON.stringify(body, null, 2)}`);

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(body),
                signal: currentController.signal
            });

            appendLog(`← HTTP ${response.status} ${response.statusText}`);

            if (!response.ok) {
                let errText;
                try { errText = await response.text(); } catch { errText = response.statusText; }
                appendLog(`错误响应:\n${errText}`);
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }

            if (stream) {
                return await handleOpenAIStream(response);
            } else {
                return await handleOpenAINonStream(response);
            }
        }

        async function handleOpenAINonStream(response) {
            const text = await response.text();
            appendLog(`完整响应:\n${text}`);

            let data;
            try {
                data = JSON.parse(text);
            } catch {
                throw new Error(`无法解析 JSON 响应: ${text.substring(0, 500)}`);
            }

            const content = data.choices?.[0]?.message?.content
                || data.choices?.[0]?.text
                || '';

            if (!content) {
                appendLog(`⚠️ 响应中未找到内容，完整结构: ${JSON.stringify(data, null, 2)}`);
            }

            const el = addAIMessage();
            const meta = `模型: ${data.model || 'N/A'} | tokens: ${data.usage?.total_tokens || 'N/A'}`;
            finalizeAIContent(el, content, meta);
            return content;
        }

        async function handleOpenAIStream(response) {
            const el = addAIMessage();
            let fullContent = '';

            // 尝试用 reader 逐块读取
            const contentType = response.headers.get('content-type') || '';
            appendLog(`Content-Type: ${contentType}`);

            // 某些中转站即使 stream=true 也返回非流式JSON
            if (contentType.includes('application/json')) {
                appendLog('⚠️ 服务端返回 JSON（非流式），改用非流式解析');
                const text = await response.text();
                appendLog(`响应:\n${text}`);
                let data;
                try { data = JSON.parse(text); } catch { throw new Error(`JSON解析失败: ${text.substring(0, 500)}`); }
                const content = data.choices?.[0]?.message?.content || data.choices?.[0]?.text || '';
                const meta = `模型: ${data.model || 'N/A'} | tokens: ${data.usage?.total_tokens || 'N/A'}`;
                finalizeAIContent(el, content, meta);
                return content;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // 按行分割
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || ''; // 保留最后不完整的一行

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed) continue;

                        // 跳过 SSE event 行
                        if (trimmed.startsWith('event:')) continue;
                        if (trimmed.startsWith(':')) continue; // SSE comment

                        if (!trimmed.startsWith('data:')) continue;

                        const dataStr = trimmed.slice(5).trim();
                        if (dataStr === '[DONE]') {
                            appendLog('收到 [DONE]');
                            continue;
                        }

                        try {
                            const json = JSON.parse(dataStr);
                            // OpenAI 格式
                            const delta = json.choices?.[0]?.delta?.content
                                || json.choices?.[0]?.delta?.text
                                || json.choices?.[0]?.text
                                || '';
                            if (delta) {
                                fullContent += delta;
                                updateAIContent(el, fullContent);
                            }
                        } catch (e) {
                            appendLog(`解析 SSE 数据块失败: ${dataStr.substring(0, 200)}`);
                        }
                    }
                }
            } finally {
                reader.releaseLock();
            }

            // 处理 buffer 中剩余数据
            if (buffer.trim()) {
                const trimmed = buffer.trim();
                if (trimmed.startsWith('data:')) {
                    const dataStr = trimmed.slice(5).trim();
                    if (dataStr && dataStr !== '[DONE]') {
                        try {
                            const json = JSON.parse(dataStr);
                            const delta = json.choices?.[0]?.delta?.content || '';
                            if (delta) {
                                fullContent += delta;
                            }
                        } catch {}
                    }
                }
            }

            finalizeAIContent(el, fullContent, null);
            return fullContent;
        }

        // ==================== Claude 接口 ====================
        async function sendClaude(baseUrl, apiKey, model, temperature, maxTokens, stream) {
            const url = baseUrl.replace(/\/+$/, '') + '/v1/messages';

            // Claude 消息格式：不支持 system 在 messages 中，需要提取
            const claudeMessages = chatHistory.map(m => ({
                role: m.role === 'assistant' ? 'assistant' : 'user',
                content: m.content
            }));

            const body = {
                model: model,
                max_tokens: maxTokens,
                messages: claudeMessages,
                stream: stream
            };

            if (temperature !== undefined && temperature !== null) {
                body.temperature = temperature;
            }

            appendLog(`→ POST ${url}`);
            appendLog(`模型: ${model} | 流式: ${stream} | temp: ${temperature} | max_tokens: ${maxTokens}`);
            appendLog(`请求体:\n${JSON.stringify(body, null, 2)}`);

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(body),
                signal: currentController.signal
            });

            appendLog(`← HTTP ${response.status} ${response.statusText}`);

            if (!response.ok) {
                let errText;
                try { errText = await response.text(); } catch { errText = response.statusText; }
                appendLog(`错误响应:\n${errText}`);
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }

            if (stream) {
                return await handleClaudeStream(response);
            } else {
                return await handleClaudeNonStream(response);
            }
        }

        async function handleClaudeNonStream(response) {
            const text = await response.text();
            appendLog(`完整响应:\n${text}`);

            let data;
            try {
                data = JSON.parse(text);
            } catch {
                throw new Error(`无法解析 JSON: ${text.substring(0, 500)}`);
            }

            // Claude 原生格式
            let content = '';
            if (data.content && Array.isArray(data.content)) {
                content = data.content.map(b => b.text || '').join('');
            }
            // 某些中转站可能转成 OpenAI 格式
            if (!content && data.choices) {
                content = data.choices[0]?.message?.content || '';
            }

            const el = addAIMessage();
            const meta = `模型: ${data.model || 'N/A'} | input: ${data.usage?.input_tokens || 'N/A'} | output: ${data.usage?.output_tokens || 'N/A'}`;
            finalizeAIContent(el, content, meta);
            return content;
        }

        async function handleClaudeStream(response) {
            const el = addAIMessage();
            let fullContent = '';
            const contentType = response.headers.get('content-type') || '';
            appendLog(`Content-Type: ${contentType}`);

            // 某些中转站可能返回非流式
            if (contentType.includes('application/json') && !contentType.includes('stream')) {
                appendLog('⚠️ 服务端返回 JSON（非流式），改用非流式解析');
                const text = await response.text();
                appendLog(`响应:\n${text}`);
                let data;
                try { data = JSON.parse(text); } catch { throw new Error(`JSON解析失败: ${text.substring(0, 500)}`); }
                let content = '';
                if (data.content && Array.isArray(data.content)) {
                    content = data.content.map(b => b.text || '').join('');
                }
                if (!content && data.choices) {
                    content = data.choices[0]?.message?.content || '';
                }
                finalizeAIContent(el, content, null);
                return content;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed) continue;
                        if (trimmed.startsWith('event:')) continue;
                        if (trimmed.startsWith(':')) continue;

                        if (!trimmed.startsWith('data:')) continue;

                        const dataStr = trimmed.slice(5).trim();
                        if (dataStr === '[DONE]') continue;

                        try {
                            const json = JSON.parse(dataStr);

                            // Claude SSE 格式
                            if (json.type === 'content_block_delta') {
                                const delta = json.delta?.text || '';
                                if (delta) {
                                    fullContent += delta;
                                    updateAIContent(el, fullContent);
                                }
                            }
                            // 某些中转站转为OpenAI格式
                            else if (json.choices) {
                                const delta = json.choices[0]?.delta?.content || '';
                                if (delta) {
                                    fullContent += delta;
                                    updateAIContent(el, fullContent);
                                }
                            }
                        } catch (e) {
                            appendLog(`解析SSE失败: ${dataStr.substring(0, 200)}`);
                        }
                    }
                }
            } finally {
                reader.releaseLock();
            }

            finalizeAIContent(el, fullContent, null);
            return fullContent;
        }
    </script>
