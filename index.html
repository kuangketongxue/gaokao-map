<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026高考知识点 3D 地图</title>
    
    <!-- 引入外部库：3D 关系图引擎 -->
    <script src="https://unpkg.com/3d-force-graph"></script>
    <script src="https://unpkg.com/three"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; background-color: #000; }

        /* 背景图片层 */
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 这里的路径指向你 GitHub 仓库里的图片 */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                        url('./assets/bg.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* 顶部导航栏 */
        nav {
            position: fixed;
            top: 0; width: 100%; height: 60px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav a {
            color: #eee; text-decoration: none; margin: 0 15px;
            font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.3s;
        }

        nav a:hover { color: #00d2ff; text-shadow: 0 0 10px #00d2ff; }

        /* 底部版权声明 */
        footer {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: rgba(0, 0, 0, 0.5); color: #888;
            display: flex; justify-content: center; align-items: center;
            font-size: 14px; z-index: 100; letter-spacing: 1px;
        }

        /* 详情弹窗 */
        #info-panel {
            position: fixed; left: 20px; top: 80px; width: 280px;
            background: rgba(15, 15, 15, 0.9); border: 1px solid #444;
            border-radius: 12px; padding: 20px; color: white;
            display: none; z-index: 101; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #info-panel h2 { margin-top: 0; color: #00d2ff; font-size: 1.2rem; }
        #info-panel p { line-height: 1.6; color: #ccc; }

        #3d-graph { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="bg-image"></div>

    <nav>
        <a onclick="filterByGroup('语文')">语文</a>
        <a onclick="filterByGroup('数学')">数学</a>
        <a onclick="filterByGroup('英语')">英语</a>
        <a onclick="filterByGroup('政治')">政治</a>
        <a onclick="filterByGroup('物理')">物理</a>
        <a onclick="filterByGroup('化学')">化学</a>
        <a onclick="showAll()" style="color: #666; font-size: 12px;">显示全部</a>
    </nav>

    <div id="3d-graph"></div>

    <div id="info-panel">
        <h2 id="node-name"></h2>
        <hr style="border:0; border-top:1px solid #333;">
        <p id="node-desc"></p>
        <button onclick="document.getElementById('info-panel').style.display='none'" 
                style="background:transparent; border:1px solid #555; color:#888; cursor:pointer; padding:5px 10px; border-radius:4px;">关闭</button>
    </div>

    <footer>2026狂客</footer>

    <script>
        let fullData = { nodes: [], links: [] };
        const Graph = ForceGraph3D()(document.getElementById('3d-graph'));

        // 初始化图谱设置
        Graph.backgroundColor('rgba(0,0,0,0)') // 透明背景显示 CSS 背景
            .nodeLabel('name')
            .nodeAutoColorBy('group')
            .linkOpacity(0.4)
            .linkWidth(1)
            .onNodeClick(node => {
                const panel = document.getElementById('info-panel');
                document.getElementById('node-name').innerText = node.name;
                document.getElementById('node-desc').innerText = node.desc;
                panel.style.display = 'block';
                
                // 镜头平滑聚焦
                const distance = 60;
                const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
                Graph.cameraPosition({ x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }, node, 1200);
            });

        // 异步加载数据文件
        Promise.all([
            fetch('./data/nodes.json').then(r => r.json()),
            fetch('./data/links.json').then(r => r.json())
        ]).then(([nodes, links]) => {
            fullData = { nodes, links };
            Graph.graphData(fullData);
        }).catch(err => console.error("数据加载失败，请检查文件路径", err));

        // 过滤功能
        function filterByGroup(groupName) {
            const filteredNodes = fullData.nodes.filter(n => n.group === groupName);
            const nodeIds = new Set(filteredNodes.map(n => n.id));
            const filteredLinks = fullData.links.filter(l => 
                nodeIds.has(l.source.id || l.source) && nodeIds.has(l.target.id || l.target)
            );
            Graph.graphData({ nodes: filteredNodes, links: filteredLinks });
        }

        function showAll() {
            Graph.graphData(fullData);
        }

        window.addEventListener('resize', () => {
            Graph.width(window.innerWidth);
            Graph.height(window.innerHeight);
        });
    </script>
</body>
</html>
